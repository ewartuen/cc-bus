        function generateStrict5MinPattern(startHour, endHour) {
            const result = [];
            for (let h = startHour; h <= endHour; h++) {
                const prefix = String(h).padStart(2, '0');
                for (let m = 0; m < 60; m += 5) {
                    const minStr = String(m).padStart(2, '0');
                    result.push({ t: `${prefix}${minStr}`, r_key: "a", c: "route-a", tc: "t-a" });
                }
            }
            return result;
        }

        // 2站相關輔助生成器
        function generateHourlyPattern2站平日日間(startHour, endHour) {
            const result = [];

                const mins = ["02","07","14","19","26","31","38","43","50","55"];
                mins.forEach((m, idx) => {

                    result.push({ t: `${prefix}${m}`, r_key: r, c: `route-${r}`, tc: `t-${r}` });
                });
            }

            const result = [];
            for (let h = startHour; h <= endHour; h++) {
                const prefix = String(h).padStart(2, '0');
                result.push(
                    { t: `${prefix}05`, r_key: "a", c: "route-a", tc: "t-a" },
                    { t: `${prefix}15`, r_key: "a", c: "route-a", tc: "t-a" },
                    { t: `${prefix}25`, r_key: "a", c: "route-a", tc: "t-a" },

                    { t: `${prefix}55`, r_key: "a", c: "route-a", tc: "t-a" }
                );
            }
            return result;
        }

        function generateStrict5MinPattern(startHour, endHour) {
            const result = [];
            const minutesPattern = ["02", "07", "12", "17", "22", "27", "32", "37", "42", "47", "52", "57"];
            for (let h = startHour; h <= endHour; h++) {
                const prefix = String(h).padStart(2, '0');
                minutesPattern.forEach(m => {
                    const isEven = parseInt(m) % 2 === 0;
                    result.push({
                        t: `${prefix}${m}`,
                        r_key: isEven ? "b" : "a",
                        c: isEven ? "route-b" : "route-a",
                        tc: isEven ? "t-b" : "t-a"
                    });
                });
            }
            return result;
        }

        async function fetchHKHolidays() {
            try {
                const response = await fetch('https://www.1823.gov.hk/common/ical/en.json');
                if (!response.ok) throw new Error('Official API load failed');
                const data = await response.json();
                const holidays = data.vcalendar[0].vevent;
                if (Array.isArray(holidays)) {
                    const parsedHolidays = [];
                    holidays.forEach(h => {
                        if (h.dtstart && h.dtstart[0]) {
                            const rawDate = h.dtstart[0];
                            const formattedDate = `${rawDate.substring(0, 4)}-${rawDate.substring(4, 6)}-${rawDate.substring(6, 8)}`;
                            parsedHolidays.push(formattedDate);
                        }
                    });
                    if(parsedHolidays.length > 0) HK_HOLIDAYS_2026 = parsedHolidays;
                }
            } catch (e) {
                console.warn("Using fallback static 2026 holidays due to API limitation:", e);
            }
        }

        // --- 核心倒數與動態即時排程引擎 ---
        function updateTracker() {
            const now = new Date();
            
            // 香港時間標準偏移修正 (UTC+8)
            const utc = now.getTime() + (now.getTimezoneOffset() * 60000);
            const hktTime = new Date(utc + (3600000 * 8));

            let hours = hktTime.getHours();
            let minutes = hktTime.getMinutes();
            let seconds = hktTime.getSeconds();

            const timeStr = `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
            const clockEl = document.getElementById('clock');
            if(clockEl) clockEl.innerText = timeStr;

            const yyyy = hktTime.getFullYear();
            const mm = String(hktTime.getMonth() + 1).padStart(2, '0');
            const dd = String(hktTime.getDate()).padStart(2, '0');
            const dateISO = `${yyyy}-${mm}-${dd}`;
            const dayOfWeek = hktTime.getDay(); 

            let isWeekendOrHoliday = false;
            let dayBadgeText = translations[currentLang].dayWeekday;

            if (dayOfWeek === 0 || dayOfWeek === 6) {
                isWeekendOrHoliday = true;
                dayBadgeText = translations[currentLang].dayWeekend;
            }
            if (HK_HOLIDAYS_2026.includes(dateISO)) {
                isWeekendOrHoliday = true;
                dayBadgeText = translations[currentLang].dayHoliday;
            }

            const badgeEl = document.getElementById('day-type-badge');
            if(badgeEl) badgeEl.innerText = dayBadgeText;

            const currentStationData = ALL_STATIONS_DATA[currentStation];
            const fullList = isWeekendOrHoliday ? currentStationData.schedule.weekend : currentStationData.schedule.weekday;

            const currentTimeWeight = (hours * 60) + minutes;
            const upcoming = [];

            for (let i = 0; i < fullList.length; i++) {
                const busObj = fullList[i];
                const busHour = parseInt(busObj.t.substring(0, 2));
                const busMin = parseInt(busObj.t.substring(2, 4));
                let busTimeWeight = (busHour * 60) + busMin;

                if (busHour === 0 || busHour === 1) {
                    busTimeWeight += 24 * 60;
                }

                let relativeCurrentWeight = currentTimeWeight;

                if (busTimeWeight >= relativeCurrentWeight) {
                    const diffMin = busTimeWeight - relativeCurrentWeight;
                    upcoming.push({
                        time: `${String(busHour).padStart(2, '0')}:${String(busMin).padStart(2, '0')}`,
                        route: translations[currentLang].routeLabels[busObj.r_key] || 'Bus',
                        className: busObj.c,
                        minutesLeft: diffMin
                    });
                    if (upcoming.length === 3) break;
                }
            }

            const container = document.getElementById('bus-container');
            if (!container) return;
            container.innerHTML = '';

            if (upcoming.length === 0) {
                container.innerHTML = `<div class="no-bus">${translations[currentLang].busEnded}${currentStationData.lastBus}</div>`;
                return;
            }

            upcoming.forEach((bus, index) => {
                const card = document.createElement('div');
                card.className = `bus-card ${bus.className} ${index === 0 ? 'next' : ''}`;
                
                let countdownContent = ``;
                if (bus.minutesLeft === 0) {
                    countdownContent = `<span style="font-size:16px; color:#2e7d32; font-weight:bold;">${translations[currentLang].arrivingSoon}</span>`;
                } else {
                    countdownContent = `${bus.minutesLeft}<span class="unit">${translations[currentLang].unitMinLeft}</span>`;
                }

                card.innerHTML = `
                    <div class="bus-info">
                        <div class="bus-time">
                            ${bus.time}
                            ${index === 0 && bus.minutesLeft === 0 ? `<span style="font-size:12px; color:#2e7d32; background:#c8e6c9; padding:2px 6px; border-radius:4px; margin-left:6px; font-weight:bold;">${translations[currentLang].arrivingSoon}</span>` : ''}
                        </div>
                        <div class="bus-route">${bus.route}</div>
                    </div>
                    <div class="countdown-container">
                        <div class="countdown">${countdownContent}</div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // --- 生命週期啟動程序 ---
        window.addEventListener('DOMContentLoaded', () => {
            const savedStation = localStorage.getItem('selectedStation');
            const savedTab = localStorage.getItem('selectedTab');
            const savedLang = localStorage.getItem('preferred-shuttle-lang') || 'zh-HK';

            if (savedStation && ALL_STATIONS_DATA[savedStation]) {
                currentStation = savedStation;
            }
            
            if (savedTab === 'weekday' || savedTab === 'weekend') {
                currentTab = savedTab;
            }

            document.getElementById('layout-container').className = `main-layout station-${currentStation}`;
            
            switchLang(savedLang);
            switchTab(currentTab);
            
            fetchHKHolidays().then(() => {
                updateTracker();
            });
            
            setInterval(updateTracker, 1000);
        });
    </script>
</body>
</html>
